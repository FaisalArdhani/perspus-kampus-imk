<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PerpusKampus</title>

    <link rel="stylesheet" href="../css/user.css" />
  </head>
  <body>
    <!-- NAVBAR -->

    <header class="navbar">
      <div class="logo">
        <img src="../asset/images/logo-unpam.png" alt="Logo" />
      </div>

      <div class="navbar-right">
        <nav id="navMenu">
          <a href="home.html" class="active"> Beranda </a>

          <a href="peminjaman.html"> Pinjaman </a>

          <a href="katalog.html"> Katalog </a>

          <a href="riwayat.html"> Riwayat </a>

          <a href="notifikasi.html"> Notifikasi </a>
        </nav>
        <a href="akun.html" class="profile"> 👤 </a>

        <div class="hamburger" id="hamburger">☰</div>
      </div>
    </header>

    <!-- HERO -->

    <section class="hero">
      <div class="overlay">
        <h1>Temukan Buku Favoritmu di PerpusKampus</h1>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Cari Buku..." />
          <button id="searchBtn">🔍</button>
        </div>
      </div>
    </section>

    <!-- POPULER -->

    <section class="section">
      <h2>Buku Paling Populer</h2>

      <div class="books-grid" id="popularBooks"></div>
    </section>

    <!-- UNGGULAN -->

    <section class="section">
      <h2>Buku Unggulan</h2>

      <div class="books-grid" id="featuredBooks"></div>
    </section>

    <section class="section">
      <h2>Buku Terbaru</h2>

      <div class="books-grid" id="recentBooks"></div>
    </section>

    <div class="load-more">
      <a href="katalog.html" class="btn-katalog"> Lihat Semua Buku </a>
    </div>

    <!-- Detail buku-->

    <div id="bookModal" class="modal">
      <div class="modal-content">
        <span class="close-btn"> &times; </span>

        <div class="modal-body">
          <img id="modalCover" src="" alt="Cover Buku" />

          <div class="modal-info">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <p>
              <strong>Penulis:</strong>
              <span id="modalAuthor"></span>
            </p>
            <p>
              <strong>Kategori:</strong>
              <span id="modalCategory"></span>
            </p>
            <p>
              <strong>Stok:</strong>
              <span id="modalStock"></span>
            </p>
            <p>
              <strong>Status:</strong>
              <span id="modalStatus"></span>
            </p>

            <div class="modal-actions">
              <button id="modalBorrowBtn" class="btn-pinjam-modal">
                Pinjam
              </button>

              <button id="modalCloseBtn" class="btn-close-modal">Tutup</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/user.js"></script>
  </body>
</html>
