<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Katalog Buku</title>

    <link rel="stylesheet" href="../css/user.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <header class="navbar">
      <div class="logo">
        <img src="../asset/images/logo-unpam.png" alt="Logo" />
      </div>

      <div class="navbar-right">
        <nav id="navMenu">
          <a href="home.html"> Beranda </a>

          <a href="peminjaman.html"> Pinjaman </a>

          <a href="katalog.html" class="active"> Katalog </a>

          <a href="riwayat.html"> Riwayat </a>

          <a href="notifikasi.html"> Notifikasi </a>
        </nav>
        <a href="akun.html" class="profile"> 👤 </a>

        <div class="hamburger" id="hamburger">☰</div>
      </div>
    </header>

    <!-- HERO -->

    <section class="hero">
      <div class="overlay">
        <h1>Jelajahi Katalog Buku</h1>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Cari Buku..." />

          <button id="searchBtn">🔍</button>
        </div>
      </div>
    </section>

    <!-- FILTER -->

    <section class="filter-section" id="filterSection"></section>

    <!-- BUKU -->

    <section class="section">
      <h2>Semua Buku</h2>

      <div class="books-grid" id="catalogBooks"></div>
    </section>
    <div class="pagination" id="pagination"></div>

    <!-- MODAL DETAIL -->

    <div class="modal" id="bookModal">
      <div class="modal-content">
        <span class="close-btn" id="closeModal"> &times; </span>

        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
    <script src="../js/storage.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/katalog.js"></script>
  </body>
</html>
